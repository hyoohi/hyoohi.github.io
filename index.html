<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Stack the Burger</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        body {
            margin: 0;
            padding: 0;
            background: #1a2639;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #game-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100%;
            background: linear-gradient(to bottom, #2b5876 0%, #4e4376 100%);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        #score-board {
            position: absolute;
            top: calc(20px + env(safe-area-inset-top));
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 22px;
            font-weight: 900;
            color: #ffffff;
            z-index: 10;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
        }
        #hud-level {
            color: #ffd54f;
        }
        #recipe-area {
            position: absolute;
            top: calc(70px + env(safe-area-inset-top));
            left: 50%;
            transform: translateX(-50%);
            background: rgba(25, 18, 46, 0.6);
            border: 2px solid #ffd54f;
            border-radius: 15px;
            padding: 8px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            min-width: 200px;
        }
        #recipe-title {
            font-size: 11px;
            color: #ffd54f;
            font-weight: bold;
            margin-bottom: 4px;
        }
        #recipe-preview {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 6px;
            height: 35px;
        }
        .recipe-icon {
            width: 30px;
            height: 30px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }
        #conveyor-belt {
            position: absolute;
            top: 140px;
            left: 0;
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 5;
        }
        .falling-ingredient {
            position: absolute;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 4;
            transform-origin: center center;
        }
        #plate {
            position: absolute;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 20px;
            background: #ffffff;
            border-radius: 50% / 100% 100% 40% 40%;
            border-bottom: 5px solid #cbd5e1;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            z-index: 6;
            transition: left 0.05s ease-out;
        }
        #plate::before {
            content: '';
            position
