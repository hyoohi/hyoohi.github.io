<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Water Slide Rush 💧</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #87CEEB; font-family: 'Arial', sans-serif; touch-action: none; }
canvas { display: block; }

/* HUD */
#hud {
  position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
  text-align: center; pointer-events: none; z-index: 10;
}
#round-display {
  font-size: 22px; font-weight: bold; color: #fff;
  text-shadow: 0 2px 8px rgba(0,0,0,0.6);
  background: rgba(0,80,180,0.45); padding: 6px 22px; border-radius: 20px;
}
#speed-bar-wrap {
  margin-top: 6px; background: rgba(0,0,0,0.3); border-radius: 10px;
  width: 180px; height: 10px; margin-left: auto; margin-right: auto;
}
#speed-bar { height: 100%; width: 0%; background: #00e5ff; border-radius: 10px; transition: width 0.1s; }

/* 메뉴 오버레이 */
#overlay {
  position: fixed; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; z-index: 20;
  background: linear-gradient(180deg, rgba(0,120,255,0.55) 0%, rgba(0,180,255,0.35) 100%);
}
#overlay h1 {
  font-size: 52px; font-weight: 900; color: #fff;
  text-shadow: 0 4px 16px rgba(0,0,100,0.5);
  margin-bottom: 8px; letter-spacing: 2px;
}
#overlay p { font-size: 17px; color: #e0f4ff; margin-bottom: 28px; }
#overlay.hidden { display: none; }

.btn-primary {
  padding: 16px 48px; font-size: 22px; font-weight: bold; letter-spacing: 1px;
  background: linear-gradient(135deg, #00c6fb, #005bea);
  color: #fff; border: none; border-radius: 40px; cursor: pointer;
  box-shadow: 0 6px 24px rgba(0,100,255,0.4);
  transition: transform 0.1s;
}
.btn-primary:active { transform: scale(0.95); }

/* JUMP 버튼 */
#jump-btn {
  position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
  padding: 22px 70px; font-size: 26px; font-weight: 900; letter-spacing: 2px;
  background: rgba(255, 140, 0, 0.88); color: #fff;
  border: 3px solid rgba(255,200,0,0.8); border-radius: 50px; cursor: pointer;
  box-shadow: 0 6px 30px rgba(255,100,0,0.5);
  z-index: 30; display: none;
  animation: jumpPulse 0.6s infinite alternate;
}
#jump-btn.visible { display: block; }
@keyframes jumpPulse {
  from { transform: translateX(-50%) scale(1); box-shadow: 0 6px 30px rgba(255,100,0,0.5); }
  to   { transform: translateX(-50%) scale(1.07); box-shadow: 0 10px 40px rgba(255,160,0,0.8); }
}

/* 결과 패널 */
#result-panel {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: rgba(0,20,60,0.85); border: 2px solid rgba(0,200,255,0.4);
  border-radius: 24px; padding: 36px 52px; text-align: center;
  color: #fff; z-index: 25; display: none; min-width: 280px;
}
#result-panel h2 { font-size: 44px; margin-bottom: 10px; }
#result-panel p  { font-size: 20px; margin-bottom: 24px; color: #90e0ff; }
.btn-row { display: flex; gap: 12px; justify-content: center; }
.btn-sm {
  padding: 11px 28px; font-size: 16px; font-weight: bold;
  border: none; border-radius: 20px; cursor: pointer;
  transition: transform 0.1s;
}
.btn-sm:active { transform: scale(0.95); }
#retry-btn  { background: #ff6b6b; color: #fff; }
#next-btn   { background: #00c6fb; color: #fff; }

/* 이탈 경고 */
#fall-warning {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  font-size: 80px; z-index: 40; display: none; animation: fadeOut 1.2s forwards;
}
@keyframes fadeOut {
  0% { opacity:1; transform: translate(-50%,-50%) scale(1); }
  100% { opacity:0; transform: translate(-50%,-70%) scale(1.5); }
}
</style>
</head>
<body>

<!-- HUD -->
<div id="hud">
  <div id="round-display">ROUND 1</div>
  <div id="speed-bar-wrap"><div id="speed-bar"></div></div>
</div>

<!-- 메인 메뉴 -->
<div id="overlay">
  <h1>💧 Water Slide</h1>
  <p>좌우 드래그 / 방향키로 슬라이드를 조종하세요!</p>
  <button class="btn-primary" id="start-btn">PLAY!</button>
</div>

<!-- JUMP 버튼 (Round 3) -->
<button id="jump-btn">🚀 JUMP!</button>

<!-- 결과 패널 -->
<div id="result-panel">
  <h2 id="result-title">PERFECT!</h2>
  <p id="result-msg">완벽한 착지!</p>
  <div class="btn-row">
    <button class="btn-sm" id="retry-btn">다시하기</button>
    <button class="btn-sm" id="next-btn">다음 라운드 →</button>
  </div>
</div>

<!-- 이탈 이모지 -->
<div id="fall-warning">💦</div>

<!-- Three.js CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ============================================================
//  CONFIG
// ============================================================
const CFG = {
  TRACK_R: 3.2,          // 슬라이드 내부 반경
  PLAYER_R: 0.42,        // 플레이어 반경
  CAM_DIST: 9,           // 카메라 후방 거리
  CAM_H: 4.5,            // 카메라 높이
  CAM_LERP: 0.1,         // 카메라 부드러움
  LATERAL_ACCEL: 0.07,   // 좌우 가속
  FRICTION: 0.84,        // 좌우 마찰
  FALL_LIMIT: 1.05,      // 이탈 판정 (±1 = 슬라이드 끝)
  MAX_SPEED_MULT: 2.2,   // 최대 속도 배율
};

// ============================================================
//  ROUND DEFINITIONS
// ============================================================
//  각 라운드: 제어점(CatmullRomCurve3), 기본 속도, 원심력 계수, 점프 갭
//  추후 제어점을 수정해 트랙 형태를 변경하세요.
const ROUNDS = [
  // ── Round 1: Beginner ── 완만한 S커브
  {
    label: 'ROUND 1 · BEGINNER',
    pts: [
      [ 0,  0,   0],
      [ 0, -1, -18],
      [ 6, -5, -38],
      [10, -9, -58],
      [ 6,-13, -78],
      [ 0,-17, -98],
      [-6,-21,-118],
      [-4,-26,-138],
      [ 0,-31,-158],
      [ 0,-36,-175],   // 수영장 진입
    ],
    speed: 0.0016,
    centrifugal: 0.5,
    hasJump: false,
    jumpGapT: [0, 0],
    poolAt: [ 0,-38,-182],
  },
  // ── Round 2: Extreme ── 급격한 S자 + 고속
  {
    label: 'ROUND 2 · EXTREME',
    pts: [
      [ 0,  0,   0],
      [ 0, -2, -14],
      [14, -9, -30],
      [16,-16, -47],
      [ 8,-23, -63],
      [ 0,-29, -78],
      [-16,-36, -94],
      [-16,-44,-110],
      [ -8,-52,-126],
      [  0,-59,-142],
      [ 14,-66,-158],
      [ 14,-74,-170],
      [  0,-81,-182],   // 수영장 진입
    ],
    speed: 0.0022,
    centrifugal: 1.3,
    hasJump: false,
    jumpGapT: [0, 0],
    poolAt: [ 0,-84,-190],
  },
  // ── Round 3: Jump & Fly ── 점프 갭 포함
  {
    label: 'ROUND 3 · JUMP & FLY',
    pts: [
      [ 0,  0,   0],
      [ 0, -3, -18],
      [ 8,-10, -36],
      [ 0,-18, -54],
      [-8,-25, -72],
      [ 0,-30, -90],   // t ≈ 0.50 → 갭 시작
      // 갭 구간: t 0.52 ~ 0.65 → 트랙 없음
      [ 0,-42,-115],   // t ≈ 0.65 → 갭 끝 (착지 지점)
      [ 8,-50,-135],
      [ 0,-58,-155],
      [ 0,-63,-172],   // 수영장 진입
    ],
    speed: 0.0026,
    centrifugal: 1.0,
    hasJump: true,
    jumpGapT: [0.50, 0.64],  // [갭 시작 t, 갭 끝 t]
    poolAt: [ 0,-66,-180],
  },
];

// ============================================================
//  THREE.JS INIT
// ============================================================
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.FogExp2(0xaaddff, 0.006);

const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 600);
camera.position.set(0, 6, 15);

// 조명
scene.add(new THREE.AmbientLight(0xffffff, 0.65));
const sun = new THREE.DirectionalLight(0xfffbe0, 1.0);
sun.position.set(30, 60, 30);
sun.castShadow = true;
scene.add(sun);

// 배경 오션 플레인
// 추후 바다 텍스처 교체 가이드:
// const oceanTex = new THREE.TextureLoader().load('ocean.jpg');
// oceanMat.map = oceanTex;
const oceanGeo = new THREE.PlaneGeometry(1000, 1000);
const oceanMat = new THREE.MeshPhongMaterial({ color: 0x006994, shininess: 60, specular: 0x88ccff });
const ocean = new THREE.Mesh(oceanGeo, oceanMat);
ocean.rotation.x = -Math.PI / 2;
ocean.position.y = -80;
scene.add(ocean);

// 배경 구름 (랜덤 박스)
for (let i = 0; i < 12; i++) {
  const cGeo = new THREE.BoxGeometry(
    8 + Math.random() * 12, 3 + Math.random() * 4, 6 + Math.random() * 8
  );
  const cMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.82 });
  const cloud = new THREE.Mesh(cGeo, cMat);
  cloud.position.set(
    (Math.random() - 0.5) * 300,
    40 + Math.random() * 40,
    -50 - Math.random() * 200
  );
  scene.add(cloud);
}

// ============================================================
//  STRIPE SHADER (블루/화이트 스트라이프)
// ============================================================
// 추후 실제 텍스처 교체 방법:
//   const slideTex = new THREE.TextureLoader().load('slide_stripe.jpg');
//   slideTex.wrapS = slideTex.wrapT = THREE.RepeatWrapping;
//   slideTex.repeat.set(8, 1);
//   stripeMat.uniforms.useTexture.value = 1.0;
//   stripeMat.uniforms.tDiffuse.value = slideTex;
const stripeMat = new THREE.ShaderMaterial({
  uniforms: { stripeCount: { value: 16.0 } },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    varying vec2 vUv;
    uniform float stripeCount;
    void main() {
      float s = mod(floor(vUv.x * stripeCount), 2.0);
      vec3 blue  = vec3(0.08, 0.48, 0.96);
      vec3 white = vec3(0.88, 0.94, 1.00);
      vec3 col = mix(white, blue, s);
      // 가장자리 어둡게 (U자형 느낌)
      float edge = smoothstep(0.0, 0.15, vUv.y) * (1.0 - smoothstep(0.85, 1.0, vUv.y));
      col *= (0.7 + 0.3 * edge);
      gl_FragColor = vec4(col, 1.0);
    }
  `,
  side: THREE.DoubleSide,
});

// ============================================================
//  GAME STATE
// ============================================================
const GS = {
  state: 'menu',   // menu | playing | airtime | falling | result
  round: 0,
  t: 0,            // 트랙 위 진행도 (0~1)
  lateral: 0,      // 좌우 위치 (-1 ~ +1, 0 = 중앙)
  latVel: 0,       // 좌우 속도
  speed: 0,        // 현재 전진 속도
  jumpVY: 0,       // 점프 수직 속도
  jumpY: 0,        // 점프 높이 오프셋
  jumpReady: false,// 점프 가능 구간 진입 여부
  jumpDone: false, // 이번 갭에서 점프 완료 여부
};

// 씬 오브젝트 핸들
let trackObj = null;
let playerObj = null;
let poolObj = null;
let trackCurve = null;
let particles = [];

// ============================================================
//  INPUT
// ============================================================
const INPUT = { left: false, right: false, dx: 0 };

// 터치
let touchX0 = null;
renderer.domElement.addEventListener('touchstart',  e => { e.preventDefault(); touchX0 = e.touches[0].clientX; }, { passive: false });
renderer.domElement.addEventListener('touchmove',   e => {
  e.preventDefault();
  if (touchX0 != null) { INPUT.dx = (e.touches[0].clientX - touchX0) * 0.018; touchX0 = e.touches[0].clientX; }
}, { passive: false });
renderer.domElement.addEventListener('touchend',    e => { e.preventDefault(); touchX0 = null; INPUT.dx = 0; }, { passive: false });

// 마우스 (PC 테스트)
let mouseDown = false, mouseX0 = 0;
renderer.domElement.addEventListener('mousedown', e => { mouseDown = true; mouseX0 = e.clientX; });
renderer.domElement.addEventListener('mousemove', e => { if (mouseDown) { INPUT.dx = (e.clientX - mouseX0) * 0.012; mouseX0 = e.clientX; } });
renderer.domElement.addEventListener('mouseup',   () => { mouseDown = false; INPUT.dx = 0; });

// 키보드
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  INPUT.left  = true;
  if (e.key === 'ArrowRight') INPUT.right = true;
  if (e.key === ' ' || e.key === 'ArrowUp') doJump();
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft')  INPUT.left  = false;
  if (e.key === 'ArrowRight') INPUT.right = false;
});

// ============================================================
//  TRACK BUILDER
// ============================================================
function buildTrack(ri) {
  if (trackObj) { scene.remove(trackObj); trackObj.geometry.dispose(); trackObj = null; }
  if (poolObj)  { scene.remove(poolObj);  poolObj  = null; }

  const rd = ROUNDS[ri];
  const pts = rd.pts.map(p => new THREE.Vector3(...p));
  trackCurve = new THREE.CatmullRomCurve3(pts);

  // TubeGeometry로 슬라이드 터널 생성
  const tubeGeo = new THREE.TubeGeometry(trackCurve, 220, CFG.TRACK_R, 14, false);
  const mat = stripeMat.clone();
  trackObj = new THREE.Mesh(tubeGeo, mat);
  trackObj.receiveShadow = true;
  scene.add(trackObj);

  buildPool(ri);
}

// ============================================================
//  POOL BUILDER (과녁 수영장)
// ============================================================
function buildPool(ri) {
  const pp = ROUNDS[ri].poolAt;
  poolObj = new THREE.Group();

  // 모래/지면 받침
  const baseGeo = new THREE.CylinderGeometry(9, 9, 0.8, 32);
  const baseMat = new THREE.MeshPhongMaterial({ color: 0xf4d58d });
  poolObj.add(new THREE.Mesh(baseGeo, baseMat));

  // 과녁 3단: Safe / Great / Perfect
  const rings = [
    { r: 7.5, col: 0x2288cc, label: 'safe' },
    { r: 4.5, col: 0x1155ee, label: 'great' },
    { r: 2.0, col: 0xffd700, label: 'perfect' },
  ];
  rings.forEach((rn, i) => {
    const geo = new THREE.CylinderGeometry(rn.r, rn.r, 0.35 + i * 0.18, 32);
    const mat = new THREE.MeshPhongMaterial({ color: rn.col, shininess: 120, specular: 0x88ddff });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.y = 0.4 + i * 0.18;
    poolObj.add(mesh);
  });

  // 물 반짝임 레이어
  const waterGeo = new THREE.CylinderGeometry(7.5, 7.5, 0.15, 32);
  const waterMat = new THREE.MeshPhongMaterial({
    color: 0x00cfff, transparent: true, opacity: 0.72, shininess: 200, specular: 0xffffff,
  });
  const waterMesh = new THREE.Mesh(waterGeo, waterMat);
  waterMesh.position.y = 1.1;
  poolObj.add(waterMesh);

  poolObj.position.set(...pp);
  scene.add(poolObj);
}

// ============================================================
//  PLAYER BUILDER
// ============================================================
function buildPlayer() {
  if (playerObj) scene.remove(playerObj);

  // 추후 캐릭터 모델 교체 가이드:
  // import { GLTFLoader } from '...'; loader.load('character.glb', gltf => { playerObj = gltf.scene; ... });
  const grp = new THREE.Group();

  // 몸통 (핑크 구체)
  const bodyGeo = new THREE.SphereGeometry(CFG.PLAYER_R, 16, 12);
  const bodyMat = new THREE.MeshPhongMaterial({ color: 0xff69b4, shininess: 100, specular: 0xffaacc });
  grp.add(new THREE.Mesh(bodyGeo, bodyMat));

  // 수영 튜브 (토러스)
  const tubeGeo = new THREE.TorusGeometry(CFG.PLAYER_R * 1.3, CFG.PLAYER_R * 0.28, 8, 20);
  const tubeMat = new THREE.MeshPhongMaterial({ color: 0xff4500, shininess: 80 });
  const tube = new THREE.Mesh(tubeGeo, tubeMat);
  tube.rotation.x = Math.PI / 2;
  grp.add(tube);

  playerObj = grp;
  scene.add(playerObj);
}

// ============================================================
//  PARTICLES (물보라)
// ============================================================
function splash(pos, grade) {
  const palettes = { perfect: [0xffd700, 0xffa500], great: [0x00bfff, 0x0080ff], safe: [0xffffff, 0xaaeeff] };
  const count    = { perfect: 90, great: 50, safe: 25 };
  const cols = palettes[grade] || palettes.safe;
  const n = count[grade] || 25;

  for (let i = 0; i < n; i++) {
    const geo = new THREE.SphereGeometry(0.14 + Math.random() * 0.12, 5, 5);
    const mat = new THREE.MeshBasicMaterial({ color: cols[i % cols.length] });
    const m = new THREE.Mesh(geo, mat);
    m.position.copy(pos);
    const ang = Math.random() * Math.PI * 2;
    const spd = 0.08 + Math.random() * 0.32;
    particles.push({ m, vx: Math.cos(ang) * spd, vy: 0.12 + Math.random() * 0.28, vz: Math.sin(ang) * spd, life: 1 });
    scene.add(m);
  }
}

function tickParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.m.position.x += p.vx;
    p.m.position.y += p.vy;
    p.m.position.z += p.vz;
    p.vy -= 0.009;
    p.life -= 0.018;
    p.m.material.opacity = p.life;
    p.m.material.transparent = true;
    if (p.life <= 0) { scene.remove(p.m); p.m.geometry.dispose(); particles.splice(i, 1); }
  }
}

// ============================================================
//  ROUND START / RESET
// ============================================================
function startRound(ri) {
  GS.state = 'playing';
  GS.round = ri;
  GS.t = 0.001;
  GS.lateral = 0;
  GS.latVel = 0;
  GS.speed = ROUNDS[ri].speed;
  GS.jumpVY = 0;
  GS.jumpY = 0;
  GS.jumpReady = false;
  GS.jumpDone = false;

  particles.forEach(p => { scene.remove(p.m); }); particles = [];
  document.getElementById('result-panel').style.display = 'none';
  document.getElementById('jump-btn').classList.remove('visible');
  document.getElementById('round-display').textContent = ROUNDS[ri].label;

  buildTrack(ri);
  buildPlayer();
}

// ============================================================
//  JUMP
// ============================================================
function doJump() {
  if (GS.state !== 'playing') return;
  if (!GS.jumpReady || GS.jumpDone) return;
  GS.state = 'airtime';
  GS.jumpVY = 0.28;
  GS.jumpY = 0;
  GS.jumpDone = true;
  document.getElementById('jump-btn').classList.remove('visible');
}

// ============================================================
//  MAIN PHYSICS UPDATE
// ============================================================
const _right = new THREE.Vector3();
const _up    = new THREE.Vector3(0, 1, 0);
const _tan   = new THREE.Vector3();
const _camTarget = new THREE.Vector3();

function physicsUpdate() {
  if (GS.state !== 'playing' && GS.state !== 'airtime') return;

  const rd = ROUNDS[GS.round];

  // ── 전진 ──
  GS.t += GS.speed;
  GS.speed = Math.min(GS.speed + 0.000004, rd.speed * CFG.MAX_SPEED_MULT);

  // ── 입력 처리 ──
  let latIn = INPUT.dx * CFG.LATERAL_ACCEL * 2.2;
  if (INPUT.left)  latIn -= CFG.LATERAL_ACCEL;
  if (INPUT.right) latIn += CFG.LATERAL_ACCEL;
  INPUT.dx *= 0.65; // 드래그 감쇠

  // ── 원심력 (커브 방향 감지) ──
  if (GS.t > 0.01 && GS.t < 0.98) {
    const t0 = Math.max(0.001, GS.t - 0.018);
    const t1 = Math.min(0.999, GS.t + 0.018);
    const p0 = trackCurve.getPointAt(t0);
    const p1 = trackCurve.getPointAt(t1);
    const dx = (p1.x - p0.x); // x방향 커브량
    const cent = dx * rd.centrifugal * GS.speed * 400;
    GS.latVel += cent;
  }

  GS.latVel += latIn;
  GS.latVel *= CFG.FRICTION;
  GS.lateral += GS.latVel * 0.07;
  GS.lateral = Math.max(-1.5, Math.min(1.5, GS.lateral)); // 범위 클램프

  // ── 점프 갭 처리 ──
  if (rd.hasJump) {
    const [gs, ge] = rd.jumpGapT;

    // 점프 준비 구간 진입
    if (GS.t >= gs - 0.08 && GS.t < gs) {
      if (!GS.jumpReady) {
        GS.jumpReady = true;
        document.getElementById('jump-btn').classList.add('visible');
      }
    }

    // 갭 구간 처리
    if (GS.t >= gs && GS.t < ge) {
      if (GS.state === 'airtime') {
        // 점프 중: 포물선 물리
        GS.jumpVY -= 0.01;
        GS.jumpY  += GS.jumpVY;
        if (GS.jumpY < 0 && GS.t >= ge - 0.03) {
          GS.jumpY = 0; GS.state = 'playing';
        }
      } else {
        // 점프 안 함 → 추락
        triggerFall();
        return;
      }
    }
  }

  // ── 이탈 판정 ──
  if (Math.abs(GS.lateral) > CFG.FALL_LIMIT) {
    triggerFall();
    return;
  }

  // ── 트랙 완주 판정 ──
  if (GS.t >= 0.975) {
    triggerClear();
    return;
  }

  updatePlayerMesh();
}

// ============================================================
//  PLAYER MESH 위치 갱신 + 카메라 추적
// ============================================================
function updatePlayerMesh() {
  if (!playerObj || !trackCurve) return;
  const t = Math.min(Math.max(GS.t, 0.001), 0.999);

  const pos = trackCurve.getPointAt(t);
  trackCurve.getTangentAt(t, _tan);

  // 슬라이드 내 좌우 오프셋 (원의 호를 따라)
  _right.crossVectors(_tan, _up).normalize();
  const latAngle = GS.lateral * 0.75; // -0.75 ~ +0.75 rad
  const rOff = Math.sin(latAngle) * CFG.TRACK_R * 0.68;
  const yOff = (1.0 - Math.cos(latAngle)) * CFG.TRACK_R * 0.35;

  pos.addScaledVector(_right, rOff);
  pos.y += yOff + CFG.PLAYER_R + GS.jumpY * 3.5;

  playerObj.position.copy(pos);
  playerObj.rotation.y = Math.atan2(_tan.x, _tan.z);

  // 카메라 추적
  _camTarget.copy(pos)
    .addScaledVector(_tan, -CFG.CAM_DIST)
    .add(new THREE.Vector3(0, CFG.CAM_H, 0));
  camera.position.lerp(_camTarget, CFG.CAM_LERP);
  camera.lookAt(pos);

  // 속도 HUD
  const pct = Math.min(100, ((GS.speed - ROUNDS[GS.round].speed) /
    (ROUNDS[GS.round].speed * (CFG.MAX_SPEED_MULT - 1))) * 100);
  document.getElementById('speed-bar').style.width = pct + '%';
}

// ============================================================
//  FALL / CLEAR
// ============================================================
function triggerFall() {
  GS.state = 'falling';
  document.getElementById('jump-btn').classList.remove('visible');

  // 이탈 이모지 애니메이션
  const fw = document.getElementById('fall-warning');
  fw.style.display = 'block';
  fw.style.animation = 'none';
  void fw.offsetWidth; // reflow
  fw.style.animation = 'fadeOut 1.2s forwards';
  setTimeout(() => { fw.style.display = 'none'; }, 1200);

  setTimeout(() => {
    GS.state = 'result';
    const rp = document.getElementById('result-panel');
    document.getElementById('result-title').textContent = '💦 이탈!';
    document.getElementById('result-msg').textContent = '슬라이드에서 떨어졌어요!';
    document.getElementById('next-btn').style.display = 'none';
    rp.style.display = 'block';
  }, 800);
}

function triggerClear() {
  GS.state = 'result';
  document.getElementById('jump-btn').classList.remove('visible');

  const abs = Math.abs(GS.lateral);
  let grade, emoji, msg;
  if      (abs < 0.18) { grade = 'perfect'; emoji = '🏆 PERFECT!'; msg = '완벽한 착지! 만점!'; }
  else if (abs < 0.50) { grade = 'great';   emoji = '⭐ GREAT!';   msg = '훌륭한 착지!'; }
  else                 { grade = 'safe';     emoji = '👍 SAFE';     msg = '안전 착지!'; }

  const poolPos = new THREE.Vector3(...ROUNDS[GS.round].poolAt);
  splash(poolPos, grade);

  document.getElementById('result-title').textContent = emoji;
  document.getElementById('result-msg').textContent   = msg;
  document.getElementById('next-btn').style.display = GS.round < 2 ? 'inline-block' : 'none';
  if (GS.round < 2) {
    document.getElementById('next-btn').textContent = `라운드 ${GS.round + 2} →`;
  }
  document.getElementById('retry-btn').style.display = 'inline-block';
  document.getElementById('result-panel').style.display = 'block';
}

// ============================================================
//  UI WIRING
// ============================================================
document.getElementById('start-btn').addEventListener('click', () => {
  document.getElementById('overlay').classList.add('hidden');
  startRound(0);
});
document.getElementById('jump-btn').addEventListener('click', doJump);
document.getElementById('jump-btn').addEventListener('touchstart', e => { e.preventDefault(); doJump(); }, { passive: false });
document.getElementById('retry-btn').addEventListener('click', () => startRound(GS.round));
document.getElementById('next-btn').addEventListener('click', () => {
  if (GS.round < 2) startRound(GS.round + 1);
  else {
    document.getElementById('result-panel').style.display = 'none';
    document.getElementById('overlay').classList.remove('hidden');
    document.getElementById('overlay').innerHTML = `
      <h1>🎉 ALL CLEAR!</h1>
      <p>3라운드 모두 클리어! 대단해요!</p>
      <button class="btn-primary" onclick="location.reload()">처음부터</button>
    `;
  }
});

// ============================================================
//  RESIZE
// ============================================================
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============================================================
//  RENDER LOOP
// ============================================================
function loop() {
  requestAnimationFrame(loop);
  physicsUpdate();
  tickParticles();
  if (poolObj) poolObj.rotation.y += 0.004; // 물 반짝임 회전
  renderer.render(scene, camera);
}

loop();
</script>
