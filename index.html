<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>직장인 사회생활 능력 테스트</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Malgun Gothic", sans-serif;
    background: #F4F1EA;
    color: #2C2A28;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 32px 16px;
  }
  .app {
    width: 100%;
    max-width: 480px;
  }
  .screen { display: none; }
  .screen.active { display: block; }

  /* ===== 시작 화면 ===== */
  .start-card {
    background: #FFFFFF;
    border-radius: 24px;
    padding: 40px 28px 32px;
    text-align: center;
    box-shadow: 0 8px 30px rgba(0,0,0,0.06);
  }
  .badge {
    display: inline-block;
    background: #FCEEDD;
    color: #8A5A1E;
    font-size: 12px;
    font-weight: 700;
    padding: 6px 14px;
    border-radius: 999px;
    margin-bottom: 18px;
    letter-spacing: 0.3px;
  }
  .emoji-stack { font-size: 56px; line-height: 1; margin-bottom: 14px; }
  h1 {
    font-size: 24px;
    font-weight: 800;
    line-height: 1.35;
    margin-bottom: 10px;
    color: #1F1C1A;
  }
  .subtitle {
    font-size: 14.5px;
    color: #6B6660;
    line-height: 1.6;
    margin-bottom: 26px;
  }
  .meta-row {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin-bottom: 28px;
    font-size: 13px;
    color: #8A847C;
  }
  .meta-row span { display: flex; align-items: center; gap: 5px; }
  .start-btn {
    width: 100%;
    background: #D85A30;
    color: #fff;
    border: none;
    border-radius: 16px;
    padding: 17px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s, background 0.15s;
  }
  .start-btn:active { transform: scale(0.97); background: #BC4A24; }

  /* ===== 질문 화면 ===== */
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 22px;
  }
  .progress-bar {
    flex: 1;
    height: 7px;
    background: #E5E0D5;
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #D85A30;
    border-radius: 999px;
    transition: width 0.35s ease;
    width: 0%;
  }
  .progress-label {
    font-size: 12.5px;
    font-weight: 700;
    color: #8A5A1E;
    white-space: nowrap;
  }
  .q-card {
    background: #FFFFFF;
    border-radius: 22px;
    padding: 30px 24px 24px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.06);
  }
  .q-number {
    font-size: 12.5px;
    font-weight: 700;
    color: #D85A30;
    margin-bottom: 8px;
    letter-spacing: 0.4px;
  }
  .q-text {
    font-size: 19px;
    font-weight: 800;
    line-height: 1.45;
    margin-bottom: 22px;
    color: #1F1C1A;
  }
  .option-btn {
    display: block;
    width: 100%;
    text-align: left;
    background: #FAF8F3;
    border: 1.5px solid #ECE7DB;
    border-radius: 14px;
    padding: 15px 16px;
    font-size: 15px;
    font-weight: 600;
    color: #393530;
    line-height: 1.5;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
  }
  .option-btn:last-child { margin-bottom: 0; }
  .option-btn:hover { border-color: #D85A30; background: #FFF6F1; }
  .option-btn:active { transform: scale(0.985); }

  /* ===== 결과 화면 ===== */
  .result-card {
    background: #FFFFFF;
    border-radius: 24px;
    padding: 36px 26px 30px;
    text-align: center;
    box-shadow: 0 8px 30px rgba(0,0,0,0.06);
  }
  .result-eyebrow {
    font-size: 13px;
    font-weight: 700;
    color: #8A847C;
    margin-bottom: 14px;
  }
  .result-emoji { font-size: 64px; margin-bottom: 14px; }
  .result-title {
    font-size: 23px;
    font-weight: 800;
    color: #D85A30;
    margin-bottom: 16px;
    line-height: 1.4;
  }
  .result-desc {
    font-size: 15px;
    color: #4A4642;
    line-height: 1.75;
    text-align: left;
    background: #FAF8F3;
    border-radius: 16px;
    padding: 18px 18px;
    margin-bottom: 18px;
  }
  .result-section-label {
    font-size: 12.5px;
    font-weight: 700;
    color: #8A5A1E;
    margin-bottom: 8px;
    text-align: left;
  }
  .tag-list { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 22px; }
  .tag {
    background: #FCEEDD;
    color: #8A5A1E;
    font-size: 12.5px;
    font-weight: 700;
    padding: 6px 12px;
    border-radius: 999px;
  }
  .compat-box {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 24px;
  }
  .compat-item {
    flex: 1;
    background: #F1F6EE;
    border-radius: 14px;
    padding: 12px 8px;
  }
  .compat-item.bad { background: #FBEAEA; }
  .compat-label { font-size: 11px; color: #8A847C; font-weight: 700; margin-bottom: 4px; }
  .compat-name { font-size: 13.5px; font-weight: 800; color: #2C2A28; }
  .btn-row { display: flex; gap: 10px; }
  .retry-btn, .share-btn {
    flex: 1;
    border-radius: 14px;
    padding: 15px;
    font-size: 14.5px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: transform 0.15s;
  }
  .retry-btn { background: #F1EEE6; color: #57524B; }
  .share-btn { background: #D85A30; color: #fff; }
  .retry-btn:active, .share-btn:active { transform: scale(0.97); }
</style>
</head>
<body>
<div class="app">

  <!-- 시작 화면 -->
  <div class="screen active" id="screen-start">

  </div>

  <!-- 질문 화면 -->
  <div class="screen" id="screen-quiz">
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>

    </div>
  </div>

  <!-- 결과 화면 -->

      <div class="compat-box">
        <div class="compat-item">
          <div class="compat-label">찰떡 케미</div>
          <div class="compat-name" id="r-good"></div>
        </div>
        <div class="compat-item bad">
          <div class="compat-label">살짝 빠그덕</div>
          <div class="compat-name" id="r-bad"></div>
        </div>
      </div>
      <div class="btn-row">
        <button class="retry-btn" id="btn-retry">다시 하기</button>
        <button class="share-btn" id="btn-share">결과 공유하기</button>
      </div>
    </div>
  </div>

</div>

let current = 0;
const scores = { A:0, B:0, C:0, D:0, E:0, F:0, G:0, H:0 };

const screenStart = document.getElementById('screen-start');
const screenQuiz = document.getElementById('screen-quiz');
const screenResult = document.getElementById('screen-result');

document.getElementById('btn-start').addEventListener('click', startQuiz);
document.getElementById('btn-retry').addEventListener('click', resetQuiz);
document.getElementById('btn-share').addEventListener('click', shareResult);

function startQuiz() {
  current = 0;
  for (const k in scores) scores[k] = 0;
  screenStart.classList.remove('active');
  screenResult.classList.remove('active');
  screenQuiz.classList.add('active');
  renderQuestion();
}

function renderQuestion() {
  const total = QUESTIONS.length;
  const item = QUESTIONS[current];
  document.getElementById('q-number').textContent = `Q${current + 1}`;
  document.getElementById('q-text').textContent = item.q;
  document.getElementById('progress-label').textContent = `${current + 1} / ${total}`;
  document.getElementById('progress-fill').style.width = `${((current) / total) * 100}%`;

  const optWrap = document.getElementById('q-options');
  optWrap.innerHTML = '';
  item.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt.t;
    btn.addEventListener('click', () => selectOption(opt.type));
    optWrap.appendChild(btn);
  });
}

function selectOption(type) {
  scores[type] += 1;
  current += 1;
  if (current >= QUESTIONS.length) {
    document.getElementById('progress-fill').style.width = '100%';
    setTimeout(showResult, 200);
  } else {
    renderQuestion();
  }
}

function showResult() {
  let bestType = 'A';
  let bestScore = -1;
  for (const k in scores) {
    if (scores[k] > bestScore) {
      bestScore = scores[k];
      bestType = k;
    }
  }
  const data = TYPES[bestType];

  document.getElementById('r-emoji').textContent = data.emoji;
  document.getElementById('r-title').textContent = data.title;
  document.getElementById('r-desc').textContent = data.desc;

  const tagWrap = document.getElementById('r-tags');
  tagWrap.innerHTML = '';
  data.tags.forEach(tag => {
    const span = document.createElement('span');
    span.className = 'tag';
    span.textContent = tag;
    tagWrap.appendChild(span);
  });

  document.getElementById('r-good').textContent = data.good;
  document.getElementById('r-bad').textContent = data.bad;

  screenQuiz.classList.remove('active');
  screenResult.classList.add('active');
}

function resetQuiz() {
  screenResult.classList.remove('active');
  screenStart.classList.add('active');
}

function shareResult() {
  const title = document.getElementById('r-title').textContent;
  const text = `나의 직장인 사회생활 유형은 "${title}"! 너도 테스트 해봐.`;
  if (navigator.share) {
    navigator.share({ title: '직장인 사회생활 능력 테스트', text }).catch(() => {});
  } else {
    navigator.clipboard.writeText(text).then(() => {
      alert('결과가 복사되었어요. 친구에게 공유해보세요!');
    }).catch(() => {
      alert(text);
    });
  }
}
</script>
